<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#4B0082">
  
  <title>Omkar & Tejal - Wedding Invitation</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100%;
      width: 100%;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      background:
        radial-gradient(circle at 20% 15%, rgba(0,0,0,0.06) 0%, rgba(0,0,0,0) 38%),
        radial-gradient(circle at 75% 30%, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0) 42%),
        linear-gradient(115deg, rgba(255,255,255,0.85) 0%, rgba(245,239,232,0.92) 45%, rgba(255,255,255,0.86) 100%),
        repeating-linear-gradient(135deg, rgba(120, 90, 160, 0.06) 0px, rgba(120, 90, 160, 0.06) 2px, rgba(0,0,0,0) 14px, rgba(0,0,0,0) 28px);
    }
    
    body {
      font-family: 'Playfair Display', serif;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 15%, rgba(0,0,0,0.06) 0%, rgba(0,0,0,0) 38%),
        radial-gradient(circle at 75% 30%, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0) 42%),
        linear-gradient(115deg, rgba(255,255,255,0.85) 0%, rgba(245,239,232,0.92) 45%, rgba(255,255,255,0.86) 100%),
        repeating-linear-gradient(135deg, rgba(120, 90, 160, 0.06) 0px, rgba(120, 90, 160, 0.06) 2px, rgba(0,0,0,0) 14px, rgba(0,0,0,0) 28px);
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      min-height: 100vh;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 0;
    }

    body {
      overscroll-behavior: none;
      -webkit-overflow-scrolling: auto;
      position: fixed;
      inset: 0;
    }

    .envelope-stage {
      position: fixed;
      inset: 0;
      z-index: 10;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      display: grid;
      place-items: center;
      perspective: 1200px;
      background:
        radial-gradient(circle at 20% 15%, rgba(0,0,0,0.06) 0%, rgba(0,0,0,0) 38%),
        radial-gradient(circle at 75% 30%, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0) 42%),
        linear-gradient(115deg, rgba(255,255,255,0.85) 0%, rgba(245,239,232,0.92) 45%, rgba(255,255,255,0.86) 100%),
        repeating-linear-gradient(135deg, rgba(120, 90, 160, 0.06) 0px, rgba(120, 90, 160, 0.06) 2px, rgba(0,0,0,0) 14px, rgba(0,0,0,0) 28px);
    }
    
    /* Keep the initial view clean: just the envelope */
    
    /* Envelope */
    .envelope {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      transform-style: preserve-3d;
    }

    .env-shadow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.32) 0%, rgba(0,0,0,0) 62%);
      transform: translateY(26px);
      filter: blur(14px);
      opacity: 0.45;
      pointer-events: none;
    }

    .env-body {
      position: absolute;
      inset: 0;
      border-radius: 0;
      background:
        radial-gradient(circle at 24% 18%, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.0) 55%),
        radial-gradient(circle at 78% 84%, rgba(0,0,0,0.10) 0%, rgba(0,0,0,0.0) 52%),
        linear-gradient(155deg, rgba(58, 32, 95, 0.96) 0%, rgba(76, 44, 120, 0.96) 55%, rgba(45, 24, 80, 0.96) 100%);
      box-shadow:
        0 34px 90px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.15),
        inset 0 0 0 1px rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .env-body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.10) 0%, rgba(0,0,0,0.14) 100%),
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.0) 0px,
          rgba(255,255,255,0.0) 7px,
          rgba(0,0,0,0.06) 8px
        );
      opacity: 0.22;
      pointer-events: none;
    }

    .env-body::after {
      content: '';
      position: absolute;
      inset: 20px;
      border: 1px solid rgba(212, 175, 55, 0.22);
      border-radius: 0;
      box-shadow:
        inset 0 0 26px rgba(0, 0, 0, 0.12);
      pointer-events: none;
    }

    .env-front {
      position: absolute;
      inset: 0;
      border-radius: 0;
      pointer-events: none;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .env-front::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(0,0,0,0.16) 100%);
      border-radius: 0;
    }

    .env-front::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 62%;
      background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0.18) 100%);
      clip-path: polygon(0 0, 50% 56%, 100% 0, 100% 100%, 0 100%);
      border-radius: 0;
      opacity: 0.70;
    }

    /* Side folds (diagonal panels like the reference mockup) */
    .env-front {
      overflow: hidden;
    }

    .env-front .fold-left,
    .env-front .fold-right {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .env-front .fold-left {
      clip-path: polygon(0 0, 52% 50%, 0 100%);
      background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(0,0,0,0.22) 100%);
      opacity: 0.88;
    }

    .env-front .fold-right {
      clip-path: polygon(100% 0, 48% 50%, 100% 100%);
      background: linear-gradient(225deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.25) 100%);
      opacity: 0.90;
    }

    .env-back {
      position: absolute;
      inset: 0;
      border-radius: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(0,0,0,0.14) 100%);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    .env-flap {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 46vh;
      transform-origin: top center;
      transform: rotateX(0deg);
      transition: transform 0.95s cubic-bezier(0.2, 0.9, 0.2, 1);
      z-index: 50;
      pointer-events: none;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .env-flap::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(0,0,0,0.30) 100%);
      clip-path: polygon(0 0, 50% 70%, 100% 0);
      border-top-left-radius: 0;
      border-top-right-radius: 0;
      box-shadow:
        0 18px 44px rgba(0,0,0,0.30),
        inset 0 -1px 0 rgba(0, 0, 0, 0.24);
      transform: translateZ(1px);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .env-flap::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 14px;
      background:
        linear-gradient(90deg, rgba(212,175,55,0.0) 0%, rgba(212,175,55,0.70) 50%, rgba(212,175,55,0.0) 100%),
        linear-gradient(180deg, rgba(255,255,255,0.30) 0%, rgba(255,255,255,0.0) 100%);
      opacity: 0.75;
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(212, 175, 55, 0.25);
    }

    .env-seal {
      position: absolute;
      left: 50%;
      top: 68vh;
      transform: translate(-50%, -50%);
      width: 82px;
      height: 82px;
      border-radius: 999px;
      border: none;
      background:
        radial-gradient(circle at 32% 28%, rgba(245, 215, 158, 0.95) 0%, rgba(170, 110, 35, 0.92) 45%, rgba(120, 75, 20, 0.95) 100%);
      box-shadow:
        0 18px 40px rgba(0,0,0,0.40),
        0 10px 18px rgba(0,0,0,0.22),
        inset 0 4px 10px rgba(255,255,255,0.25),
        inset 0 -3px 10px rgba(0,0,0,0.32);
      cursor: pointer;
      z-index: 90;
      transition: transform 0.12s ease, opacity 0.4s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .env-seal::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 999px;
      background: radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.25) 0%, rgba(212, 175, 55, 0.0) 70%);
      filter: blur(4px);
      pointer-events: none;
    }

    .env-seal:active {
      transform: translate(-50%, -50%) scale(0.96);
    }

    .env-seal::after {
      content: '';
      position: absolute;
      inset: 10px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.30) 0%, rgba(255,255,255,0.0) 55%);
      pointer-events: none;
    }

    .open-instruction {
      position: absolute;
      left: 50%;
      top: calc(68vh + 64px);
      transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.92);
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      pointer-events: none;
      z-index: 90;
      transition: opacity 0.35s ease;
    }

    body.reveal-invite .open-instruction {
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .envelope.open + .open-instruction {
      opacity: 0;
    }

    .envelope.open .env-flap {
      transform: rotateX(-180deg);
    }

    .envelope.open .env-seal {
      opacity: 0;
      pointer-events: none;
    }

    .envelope.open {
      transition: opacity 0.55s ease, transform 0.65s ease;
      transform: scale(1.02);
    }

    body.opening .envelope {
      opacity: 0;
      transform: translateY(-14px) scale(1.06);
      transition: opacity 0.18s ease, transform 0.22s ease;
    }

    body.opening .env-shadow {
      opacity: 0;
      transition: opacity 0.18s ease;
    }

    
    /* Mobile responsive */
    @media (max-width: 768px) {
      body {
        padding: 0;
      }

      .env-flap {
        height: 44vh;
      }
      .env-seal {
        width: 70px;
        height: 70px;
      }

      .open-instruction {
        top: calc(68vh + 58px);
      }
    }
    
    @media (max-width: 480px) {
      .env-seal {
        width: 66px;
        height: 66px;
      }
    }
  </style>
</head>
<body>

  <div class="envelope-stage">
    <div class="env-shadow" aria-hidden="true"></div>
    <div class="envelope" id="envelope" aria-label="Wedding invitation envelope">
      <div class="env-back" aria-hidden="true"></div>
      <div class="env-body" aria-hidden="true"></div>

      <div class="env-front" aria-hidden="true">
        <div class="fold-left" aria-hidden="true"></div>
        <div class="fold-right" aria-hidden="true"></div>
      </div>
      <div class="env-flap" aria-hidden="true"></div>
      <button class="env-seal" id="openSeal" type="button" aria-label="Open invitation"></button>
      <div class="open-instruction" aria-hidden="true">Tap the seal to open</div>
    </div>
  </div>
  
  <script>
    // Open invitation
    let isOpening = false;
    function openInvite() {
      // Prevent multiple clicks
      if (isOpening) return;
      isOpening = true;

      const envelope = document.getElementById('envelope');
      // iPhone Safari can skip/short-circuit transitions if the class is applied in the same frame.
      // Force a layout flush and apply the class on the next animation frame.
      envelope.classList.remove('open');
      void envelope.offsetWidth;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          envelope.classList.add('open');
        });
      });

      // Add haptic feedback (vibration on mobile)
      if (navigator.vibrate) {
        navigator.vibrate([100, 50, 100]);
      }
      
      setTimeout(() => {
        document.body.classList.add('opening');
      }, 850);

      setTimeout(() => {
        window.location.href = 'invite.html';
      }, 1100);
    }

    function resetLandingState() {
      isOpening = false;
      document.body.classList.remove('opening');
      const envelope = document.getElementById('envelope');
      if (envelope) envelope.classList.remove('open');
    }

    // Ensure state resets when returning via back button (bfcache)
    window.addEventListener('pageshow', function(event) {
      if (event.persisted) {
        resetLandingState();
      }
    });
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) resetLandingState();
    });
    
    // Tap/click the seal to open
    const seal = document.getElementById('openSeal');
    seal.addEventListener('click', openInvite);
    seal.addEventListener('touchstart', function() {
      this.style.transform = 'translate(-50%, -50%) scale(0.96)';
    });
    seal.addEventListener('touchend', function() {
      this.style.transform = 'translate(-50%, -50%) scale(1)';
    });
  </script>
  
</body>
</html>
